name: 🔄 Sincronização GitHub → GitLab AGES

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, closed, merged, synchronize, reopened]
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  create:
  delete:
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Forçar sincronização completa'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '*/30 * * * *'

env:
  GITLAB_URL: ${{ vars.GITLAB_URL }}
  GITLAB_GROUP_ID: ${{ vars.GITLAB_GROUP_ID }}
  GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
  GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
  GIT_TOKEN: ${{ secrets.GIT_TOKEN }}

jobs:
  sync-to-gitlab:
    name: 🦊 Sincronizar com GitLab AGES
    runs-on: ubuntu-latest
    steps:
    - name: 🔍 Verificar Pré-requisitos
      run: |
        if [ -z "$GITLAB_TOKEN" ] || [ -z "$GITLAB_PROJECT_ID" ] || [ -z "$GITLAB_GROUP_ID" ]; then
          echo "❌ GITLAB_TOKEN, GITLAB_PROJECT_ID ou GITLAB_GROUP_ID não configurados"
          echo "Configure os secrets e variables necessários no repositório"
          exit 1
        fi
        echo "✅ Todos os pré-requisitos atendidos"
    
    - name: 📥 Checkout do Repositório
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GIT_TOKEN }}

    - name: ⚙️ Configurar Git
      run: |
        git config --global user.name "GitHub Actions Sync"
        git config --global user.email "sync@promata.com.br"
        git config --global init.defaultBranch main

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Instalar Dependências
      run: |
        pip install --upgrade pip
        pip install requests python-gitlab python-dateutil pytz

    - name: 📋 Verificar Configuração
      run: |
        echo "🔍 Verificando configuração..."
        echo "Repositório: ${{ github.repository }}"
        echo "GitLab URL: $GITLAB_URL"
        echo "Project ID: $GITLAB_PROJECT_ID"
        echo "Trigger: ${{ github.event_name }}"

    - name: � Testar Conexão GitLab
      run: python3 scripts/test-gitlab-connection.py
      continue-on-error: true

    - name: �🔄 Executar Sincronização Completa
      run: python3 scripts/sync-complete.py

    - name: 📤 Upload do Relatório de Sincronização
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sync-report-${{ github.run_number }}
        path: sync-report.md
        retention-days: 30